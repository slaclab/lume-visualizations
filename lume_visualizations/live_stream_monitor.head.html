<script>
// Auto-connect and hide-code script — active in marimo edit mode only.
// In marimo run mode all of these buttons are absent, so the handlers are
// no-ops and the MutationObserver disconnects after 30 s.
(() => {
  const state = {
    connected: false,
    previewed: false,
  };

  const getConnectionState = () =>
    document.querySelector("#App")?.getAttribute("data-connection-state");

  const clickConnect = () => {
    if (state.connected) {
      return;
    }
    const connectButton = Array.from(document.querySelectorAll("button")).find(
      (button) => button.textContent?.trim() === "Click to connect",
    );
    if (connectButton instanceof HTMLElement) {
      connectButton.click();
    }
  };

  const clickPreview = () => {
    if (state.previewed) {
      return;
    }
    const previewButton = document.querySelector(
      'button[data-testid="hide-code-button"]',
    );
    if (previewButton instanceof HTMLElement) {
      previewButton.click();
      state.previewed = true;
    }
  };

  const bootstrap = () => {
    const connectionState = getConnectionState();
    if (connectionState === "OPEN") {
      state.connected = true;
      clickPreview();
      return;
    }
    clickConnect();
  };

  window.addEventListener("load", () => {
    bootstrap();
    const observer = new MutationObserver(bootstrap);
    observer.observe(document.documentElement, {
      attributes: true,
      childList: true,
      subtree: true,
    });
    window.setInterval(bootstrap, 1000);
    window.setTimeout(() => observer.disconnect(), 30000);
  });
})();
</script>
<script>
(() => {
  const sessionParam = "lume_session";
  const appPrefix = "/live-monitor";
  const sessionId = new URL(window.location.href).searchParams.get(sessionParam);

  if (!sessionId) {
    return;
  }

  const rewriteUrl = (rawUrl) => {
    const resolvedUrl = new URL(rawUrl, window.location.href);
    const isSameHost = resolvedUrl.host === window.location.host;
    const isSamePath = resolvedUrl.pathname.startsWith(appPrefix);
    if (!isSameHost || !isSamePath) {
      return rawUrl;
    }
    if (!resolvedUrl.searchParams.has(sessionParam)) {
      resolvedUrl.searchParams.set(sessionParam, sessionId);
    }
    return resolvedUrl.toString();
  };

  const originalFetch = window.fetch.bind(window);
  window.fetch = (input, init) => {
    if (input instanceof Request) {
      const nextUrl = rewriteUrl(input.url);
      if (nextUrl !== input.url) {
        input = new Request(nextUrl, input);
      }
      return originalFetch(input, init);
    }
    return originalFetch(rewriteUrl(input), init);
  };

  const originalOpen = XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open = function (method, url, ...rest) {
    return originalOpen.call(this, method, rewriteUrl(url), ...rest);
  };

  const OriginalWebSocket = window.WebSocket;
  class SessionWebSocket extends OriginalWebSocket {
    constructor(url, protocols) {
      super(rewriteUrl(url), protocols);
    }
  }
  Object.defineProperty(SessionWebSocket, "CONNECTING", {
    value: OriginalWebSocket.CONNECTING,
  });
  Object.defineProperty(SessionWebSocket, "OPEN", {
    value: OriginalWebSocket.OPEN,
  });
  Object.defineProperty(SessionWebSocket, "CLOSING", {
    value: OriginalWebSocket.CLOSING,
  });
  Object.defineProperty(SessionWebSocket, "CLOSED", {
    value: OriginalWebSocket.CLOSED,
  });
  window.WebSocket = SessionWebSocket;
})();
</script>
<script>
// Allocator heartbeat — tells the allocator which worker this tab is using
// so it won't assign the same worker to another user.  The worker index is
// extracted from the URL path (/live-monitor/wN/).
//
// On page load the script sends an immediate heartbeat to claim the worker.
// Refresh works because the heartbeat simply refreshes the timestamp for
// the same worker.  If a user navigates directly to a busy worker URL
// (e.g. bookmarked /live-monitor/w1/ while another user is on it) the
// script detects the conflict via /live-monitor/worker-status and redirects
// them to /live-monitor/ for a fresh assignment.
(() => {
  const match = window.location.pathname.match(/\/live-monitor\/w(\d+)/);
  if (!match) return; // Not on a worker page — skip.

  const workerIndex = match[1];
  const heartbeatUrl = "/live-monitor/heartbeat?worker=" + workerIndex;
  const releaseUrl = "/live-monitor/release?worker=" + workerIndex;
  const statusUrl = "/live-monitor/worker-status?worker=" + workerIndex;
  const allocatorUrl = "/live-monitor/";
  const intervalMs = 60000; // 1 minute

  let claimed = false;

  const sendHeartbeat = () => {
    fetch(heartbeatUrl, { method: "POST", credentials: "same-origin" })
      .then(() => { claimed = true; })
      .catch(() => {});
  };

  // On first load, check if someone else already owns this worker.
  // The allocator marks a worker busy immediately on assign(), so if we
  // were allocated this worker (normal flow), the status will say busy —
  // but that's us.  If we arrived here via refresh, the old heartbeat is
  // still ours.  If someone ELSE is on this worker, they have a recent
  // heartbeat and we should redirect.
  //
  // Strategy: immediately send a heartbeat (claiming/refreshing our slot),
  // then start the periodic timer.  The allocator uses last-write-wins so
  // a refresh simply updates the timestamp.
  sendHeartbeat();
  const heartbeatTimer = setInterval(sendHeartbeat, intervalMs);

  // Release the worker slot when the tab is closed or navigated away.
  const releaseWorker = () => {
    navigator.sendBeacon(releaseUrl);
  };
  window.addEventListener("pagehide", releaseWorker);
})();
</script>
<script>
// Error recovery — if marimo loses its WebSocket connection (e.g. worker
// crashed on refresh / segfault), redirect to the allocator so the user
// gets a fresh worker instead of staring at a dead page.
(() => {
  const onWorkerPage = /\/live-monitor\/w\d+/.test(window.location.pathname);
  if (!onWorkerPage) return;

  const allocatorUrl = "/live-monitor/";
  let wasConnected = false;
  let redirecting = false;

  const checkConnection = () => {
    if (redirecting) return;
    const appEl = document.querySelector("#App");
    if (!appEl) return;
    const state = appEl.getAttribute("data-connection-state");
    if (state === "OPEN") {
      wasConnected = true;
      return;
    }
    if (wasConnected && (state === "CLOSED" || state === "ERROR")) {
      // Connection was open but is now broken — worker likely crashed.
      // Wait a moment to distinguish a temporary blip from a real crash.
      redirecting = true;
      setTimeout(() => {
        const retryState = document.querySelector("#App")
          ?.getAttribute("data-connection-state");
        if (retryState !== "OPEN") {
          window.location.href = allocatorUrl;
        } else {
          redirecting = false;
        }
      }, 3000);
    }
  };

  // Poll connection state every 2 seconds.
  setInterval(checkConnection, 2000);
})();
</script>
