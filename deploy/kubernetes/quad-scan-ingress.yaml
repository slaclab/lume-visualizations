apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lume-quad-scan
  namespace: lume-visualizations
  annotations:
    nginx.ingress.kubernetes.io/whitelist-source-range: "71.198.255.25,134.79.0.0/16,172.16.0.0/12,208.45.173.162,216.46.165.69,172.27.8.0/24"
    nginx.ingress.kubernetes.io/proxy-body-size: 2g
    nginx.ingress.kubernetes.io/client-max-body-size: 2g
    nginx.ingress.kubernetes.io/proxy-read-timeout: "1800"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "1800"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: "ard-modeling-service.slac.stanford.edu"
      http:
        paths:
          - path: /quad-scan(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: lume-quad-scan
                port:
                  number: 80