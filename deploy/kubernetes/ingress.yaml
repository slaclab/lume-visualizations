apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lume-visualizations
  annotations:
    nginx.ingress.kubernetes.io/whitelist-source-range: "71.198.255.25,134.79.0.0/16,172.16.0.0/12,208.45.173.162,216.46.165.69"
    nginx.ingress.kubernetes.io/proxy-body-size: 2g
    nginx.ingress.kubernetes.io/client-max-body-size: 2g
    nginx.ingress.kubernetes.io/proxy-read-timeout: "1800"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "1800"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    # WebSocket support required for marimo run-mode reactive updates over HTTPS.
    # proxy-http-version must be 1.1 for the Upgrade handshake; the
    # configuration-snippet forwards the Upgrade/Connection headers.
    # Note: configuration-snippet requires allow-snippet-annotations: "true"
    # in the ingress-nginx controller ConfigMap (disabled in some hardened clusters).
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
spec:
  ingressClassName: nginx
  rules:
  - host: "ard-modeling-service.slac.stanford.edu"
    http:
      paths:
        - path: /live-monitor
          pathType: Prefix
          backend:
            service:
              name: lume-live-monitor
              port:
                number: 80