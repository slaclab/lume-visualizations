apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lume-visualizations
  annotations:
    nginx.ingress.kubernetes.io/whitelist-source-range: "71.198.255.25,134.79.0.0/16,172.16.0.0/12,208.45.173.162,216.46.165.69"
    nginx.ingress.kubernetes.io/proxy-body-size: 2g
    nginx.ingress.kubernetes.io/client-max-body-size: 2g
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3900"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3900"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    # WebSocket support: nginx-ingress handles Upgrade/Connection headers
    # automatically via its built-in $http_upgrade / $connection_upgrade map.
    # Routing: per-worker paths (/live-monitor/wN) go directly to each
    # worker pod.  The base path (/live-monitor) goes to the allocator which
    # redirects to an available worker.
spec:
  ingressClassName: nginx
  rules:
  - host: "ard-modeling-service.slac.stanford.edu"
    http:
      paths:
        # Per-worker paths — longest prefix matches first in nginx.
        - path: /live-monitor/w0
          pathType: Prefix
          backend:
            service:
              name: lume-live-monitor-w0
              port:
                number: 80
        - path: /live-monitor/w1
          pathType: Prefix
          backend:
            service:
              name: lume-live-monitor-w1
              port:
                number: 80
        - path: /live-monitor/w2
          pathType: Prefix
          backend:
            service:
              name: lume-live-monitor-w2
              port:
                number: 80
        - path: /live-monitor/w3
          pathType: Prefix
          backend:
            service:
              name: lume-live-monitor-w3
              port:
                number: 80
        - path: /live-monitor/w4
          pathType: Prefix
          backend:
            service:
              name: lume-live-monitor-w4
              port:
                number: 80
        # Catch-all — allocator redirects to a free worker.
        - path: /live-monitor
          pathType: Prefix
          backend:
            service:
              name: lume-live-monitor-allocator
              port:
                number: 80