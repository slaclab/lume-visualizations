apiVersion: v1
kind: ConfigMap
metadata:
  # EPICS network config — production mode with real facility PVs.
  # Points the CA client at the LCLS Channel Access gateway.
  # Replace EPICS_CA_ADDR_LIST with the actual gateway IP(s) for your site.
  #
  # To switch, change the configmap-epics-*.yaml resource in kustomization.yaml.
  name: lume-epics-config
  namespace: lume-visualizations
data:
  # Do NOT start the fake IOC; connect to the real CA gateway instead.
  LUME_START_FAKE_EPICS: "0"
  # CA client: disable broadcast discovery and use the explicit gateway address.
  EPICS_CA_AUTO_ADDR_LIST: "NO"
  # Replace with the real LCLS Channel Access gateway IP address.
  EPICS_CA_ADDR_LIST: "134.79.151.21:5065"
