apiVersion: apps/v1
kind: Deployment
metadata:
  name: lume-live-monitor
  namespace: lume-visualizations
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lume-live-monitor
  template:
    metadata:
      labels:
        app: lume-live-monitor
    spec:
      containers:
        - name: app
          image: ghcr.io/slaclab/lume-visualizations:latest
          imagePullPolicy: Always
          restartPolicy: Always
          resources:
            limits:
              memory: "2Gi"
              cpu: "1000m"
          args:
            - python
            - -m
            - marimo
            - run
            - /app/lume_visualizations/live_stream_monitor.py
            - --host
            - 0.0.0.0
            - --port
            - "2719"
            - --base-url
            - /live-monitor
            - --no-token
            - --allow-origins
            - https://ard-modeling-service.slac.stanford.edu
          envFrom:
            - configMapRef:
                name: lume-visualizations-config
            - configMapRef:
                name: lume-epics-config
          volumeMounts:
            - name: live-monitor-ui
              mountPath: /app/lume_visualizations/live_stream_monitor.py
              subPath: live_stream_monitor.py
            - name: live-monitor-ui
              mountPath: /app/lume_visualizations/live_stream_monitor.css
              subPath: live_stream_monitor.css
            - name: live-monitor-ui
              mountPath: /app/lume_visualizations/live_stream_monitor.head.html
              subPath: live_stream_monitor.head.html
          ports:
            - containerPort: 2719
              name: http
      volumes:
        - name: live-monitor-ui
          configMap:
            name: lume-live-monitor-ui
---
apiVersion: v1
kind: Service
metadata:
  name: lume-live-monitor
  namespace: lume-visualizations
spec:
  selector:
    app: lume-live-monitor
  ports:
    - name: http
      port: 80
      targetPort: 2719
