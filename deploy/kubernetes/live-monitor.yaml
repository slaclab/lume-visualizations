apiVersion: apps/v1
kind: Deployment
metadata:
  name: lume-live-monitor
  namespace: lume-visualizations
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lume-live-monitor
  template:
    metadata:
      labels:
        app: lume-live-monitor
    spec:
      restartPolicy: Always
      containers:
        - name: proxy
          image: ghcr.io/slaclab/lume-visualizations:latest
          imagePullPolicy: Always
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
          args:
            - python
            - -m
            - lume_visualizations.live_monitor_pool
            - --host
            - 0.0.0.0
            - --port
            - "2719"
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LUME_BASE_URL
              value: /live-monitor
            - name: LUME_WORKER_COUNT
              value: "5"
            - name: LUME_WORKER_STATEFULSET
              value: lume-live-monitor-worker
            - name: LUME_WORKER_HEADLESS_SERVICE
              value: lume-live-monitor-worker
            - name: LUME_WORKER_PORT
              value: "2719"
            - name: LUME_SESSION_TIMEOUT_SECONDS
              value: "3600"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 2719
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 2719
            initialDelaySeconds: 15
            periodSeconds: 20
          ports:
            - containerPort: 2719
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: lume-live-monitor
  namespace: lume-visualizations
spec:
  selector:
    app: lume-live-monitor
  ports:
    - name: http
      port: 80
      targetPort: 2719
---
apiVersion: v1
kind: Service
metadata:
  name: lume-live-monitor-worker
  namespace: lume-visualizations
spec:
  clusterIP: None
  selector:
    app: lume-live-monitor-worker
  ports:
    - name: http
      port: 2719
      targetPort: 2719
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lume-live-monitor-worker
  namespace: lume-visualizations
spec:
  serviceName: lume-live-monitor-worker
  podManagementPolicy: Parallel
  replicas: 5
  selector:
    matchLabels:
      app: lume-live-monitor-worker
  template:
    metadata:
      labels:
        app: lume-live-monitor-worker
    spec:
      restartPolicy: Always
      containers:
        - name: app
          image: ghcr.io/slaclab/lume-visualizations:latest
          imagePullPolicy: Always
          resources:
            limits:
              memory: "2Gi"
              cpu: "1000m"
          args:
            - python
            - -m
            - marimo
            - run
            - /app/lume_visualizations/live_stream_monitor.py
            - --host
            - 0.0.0.0
            - --port
            - "2719"
            - --base-url
            - /live-monitor
            - --no-token
            - --allow-origins
            - https://ard-modeling-service.slac.stanford.edu
          envFrom:
            - configMapRef:
                name: lume-visualizations-config
            - configMapRef:
                name: lume-epics-config
          volumeMounts:
            - name: live-monitor-ui
              mountPath: /app/lume_visualizations/live_stream_monitor.py
              subPath: live_stream_monitor.py
            - name: live-monitor-ui
              mountPath: /app/lume_visualizations/live_stream_monitor.css
              subPath: live_stream_monitor.css
            - name: live-monitor-ui
              mountPath: /app/lume_visualizations/live_stream_monitor.head.html
              subPath: live_stream_monitor.head.html
          readinessProbe:
            httpGet:
              path: /live-monitor/
              port: 2719
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live-monitor/
              port: 2719
            initialDelaySeconds: 30
            periodSeconds: 30
          ports:
            - containerPort: 2719
              name: http
      volumes:
        - name: live-monitor-ui
          configMap:
            name: lume-live-monitor-ui
