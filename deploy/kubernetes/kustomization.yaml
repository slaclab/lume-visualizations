apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: lume-visualizations
resources:
  - namespace.yaml
  - configmap.yaml
  # EPICS mode: include ONE of the two configmap-epics-*.yaml files below.
  # - configmap-epics-fake.yaml   # for in-pod fake IOC (local/staging)
  # - configmap-epics-real.yaml   # for LCLS CA gateway (production)
  - configmap-epics-real.yaml
  - quad-scan.yaml
  - live-monitor.yaml
  - ingress.yaml
  - quad-scan-ingress.yaml

images:
  - name: ghcr.io/slaclab/lume-visualizations
    newTag: pool

configMapGenerator:
  - name: lume-live-monitor-ui
    files:
      - live-monitor-ui/live_stream_monitor.py
      - live-monitor-ui/live_stream_monitor.css
      - live-monitor-ui/live_stream_monitor.head.html
      - live-monitor-ui/live_monitor_allocator.py
      - live-monitor-ui/dashboard.py

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: lume-quad-scan
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/args
        value:
          - lume-quad-scan
          - --host
          - 0.0.0.0
          - --port
          - "2718"
          - --headless
